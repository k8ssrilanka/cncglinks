# ─────────────────────────────────────────────────────────────────────────────
# Community Link-in-Bio Config
# Edit this file to customise your community's page.
# All fields except community.name are optional.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Community Identity ──────────────────────────────────────────────────────
community:
  name: "Cloud Native Community Groups — Sri Lanka"
  tagline: "Building the future of cloud-native, together."
  description: |
    We are a community of engineers, developers, and enthusiasts exploring
    Kubernetes, cloud-native technologies, and the CNCF ecosystem in Sri Lanka.
    Join us to learn, share, and grow together.
  logoUrl: "/logo.png"         # Place your logo in /public/logo.png
  faviconUrl: "/favicon.ico"
  themeColor: "#0F62FE"        # Used for CTA button and accent colours

# ─── Social Media ────────────────────────────────────────────────────────────
# Remove any line you don't have — its icon simply won't appear
social:
  instagram: "https://www.instagram.com/cncg.lk/"
  facebook:  "https://www.facebook.com/cncgsrilanka"
  linkedin:  "https://www.linkedin.com/company/cncg-sri-lanka"
  youtube:   "https://www.youtube.com/@cncgsrilanka"
  x:         "https://x.com/cncgsrilanka"

# ─── Custom Links ────────────────────────────────────────────────────────────
links:
  - label: "CNCF Landscape"
    url: "https://landscape.cncf.io"
    icon: "🗺️"
  - label: "Community Calendar"
    url: "https://calendar.google.com/calendar/embed?src=cncgsrilanka%40gmail.com"
    icon: "📅"
  - label: "Slack Workspace"
    url: "https://slack.cncf.io"
    icon: "💬"
  - label: "GitHub"
    url: "https://github.com/cncg-srilanka"
    icon: "🐙"

# ─── Join CTA ────────────────────────────────────────────────────────────────
joinCta:
  label: "Join our Community"
  url: "https://community.cncf.io/cloud-native-sri-lanka/"
  style: "primary"             # "primary" (filled) or "outline"

